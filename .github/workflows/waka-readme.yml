name: WakaTime Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    name: Update WakaTime Stats
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch WakaTime Stats & Update README
        env:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
        run: |
          python3 << 'PYTHON_SCRIPT'
          import base64
          import json
          import os
          import re
          import urllib.request
          import urllib.error
          import time

          api_key = os.environ.get('WAKATIME_API_KEY', '')
          if not api_key:
              print('ERROR: WAKATIME_API_KEY env var is missing')
              exit(1)

          encoded_key = base64.b64encode(api_key.encode()).decode()
          url = 'https://wakatime.com/api/v1/users/current/summaries?range=last_7_days'

          body = None
          for attempt in range(4):
              try:
                  req = urllib.request.Request(url, headers={
                      'Authorization': f'Basic {encoded_key}',
                      'User-Agent': 'GitHub-Actions-WakaTime-Stats/1.0',
                  })
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      body = json.loads(resp.read().decode())
                      if body and 'data' in body:
                          break
              except Exception as e:
                  print(f'Attempt {attempt+1} failed: {e}')

              if attempt < 3:
                  wait = 30 * (attempt + 1)
                  print(f'Retrying in {wait}s...')
                  time.sleep(wait)

          if not body or 'data' not in body:
              print('ERROR: Could not fetch WakaTime stats after multiple attempts')
              exit(1)

          print('Successfully fetched WakaTime summaries')

          # ── aggregate data ────────────────────────────────────────

          total_seconds = sum(d.get('grand_total', {}).get('total_seconds', 0) for d in body['data'])

          def format_time(sec):
              m, s = divmod(sec, 60)
              h, m = divmod(m, 60)
              if h > 0:
                  return f'{int(h)} hrs {int(m)} mins'
              return f'{int(m)} mins'

          human_total = format_time(total_seconds)
          daily_avg_sec = total_seconds / 7.0 if total_seconds > 0 else 0
          daily_avg = format_time(daily_avg_sec)

          best_day_sec = -1
          best_day_text = ''
          for d in body['data']:
              sec = d.get('grand_total', {}).get('total_seconds', 0)
              if sec > best_day_sec:
                  best_day_sec = sec
                  best_day_date = d.get('range', {}).get('date', '')
                  if best_day_date and sec > 0:
                      best_day_text = f'{best_day_date} ({format_time(sec)})'

          def aggregate(key):
              agg = {}
              for d in body['data']:
                  for item in d.get(key, []):
                      name = item.get('name', 'Unknown')
                      agg[name] = agg.get(name, 0) + item.get('total_seconds', 0)
              
              res = []
              if total_seconds > 0:
                  for name, sec in sorted(agg.items(), key=lambda x: x[1], reverse=True):
                      if sec == 0: continue
                      pct = (sec / total_seconds) * 100
                      res.append({'name': name, 'percent': pct, 'text': format_time(sec)})
              return res

          languages = aggregate('languages')
          oses      = aggregate('operating_systems')
          machines  = aggregate('machines')

          # ── helpers ──────────────────────────────────────────────

          def make_table(title, emoji, items, total_text, name_label):
              if not items:
                  return ''

              lines = []
              lines.append(f'**{emoji} {title}**')
              lines.append('')
              lines.append(f'| {name_label} | Time | Usage |')
              lines.append(f'|:-----------|:-----|:------|')

              for item in items:
                  name  = item.get('name', 'Unknown')
                  tm    = item.get('text', '0 mins')
                  pct   = item.get('percent', 0)
                  bar_len = 21
                  filled  = round(pct / 100 * bar_len)
                  filled  = max(0, min(bar_len, filled))
                  bar = '\u2588' * filled + '\u2591' * (bar_len - filled)
                  lines.append(f'| {name} | `{tm}` | {bar} {pct:.2f}% |')

              lines.append(f'| **Total** | **{total_text}** | |')
              lines.append('')
              return '\n'.join(lines)

          # ── build content ────────────────────────────────────────

          content = ''
          content += f'**Last 7 Days** \u2014 Total: **{human_total}** \u2014 Daily Avg: **{daily_avg}**'
          if best_day_text:
              content += f' \u2014 Most Active: **{best_day_text}**'
          content += '\n\n'

          content += make_table('Languages',        '\U0001f4bb',       languages, human_total, 'Language')
          content += make_table('Operating Systems', '\U0001f4be',      oses,      human_total, 'OS')
          content += make_table('Machines',         '\U0001f527',       machines,  human_total, 'Machine')

          # ── update README ────────────────────────────────────────

          readme_path = 'README.md'
          with open(readme_path, 'r', encoding='utf-8') as f:
              readme = f.read()

          pattern = r'(<!--START_SECTION:waka-->)[\s\S]*?(<!--END_SECTION:waka-->)'
          if not re.search(pattern, readme):
              print('ERROR: Could not find <!--START_SECTION:waka--> ... <!--END_SECTION:waka--> in README')
              exit(1)

          replacement = f'<!--START_SECTION:waka-->\n\n{content}\n<!--END_SECTION:waka-->'
          new_readme = re.sub(pattern, replacement, readme)

          if new_readme == readme:
              print('README unchanged, nothing to commit')
              exit(0)

          with open(readme_path, 'w', encoding='utf-8') as f:
              f.write(new_readme)

          print('README updated with new WakaTime stats')

          PYTHON_SCRIPT

      - name: Commit & Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update WakaTime stats"
          git push
